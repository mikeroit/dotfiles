# stow/kitty/.config/kitty/kitty-theme-contrast.conf
# High-contrast palette for bright/outdoor lighting.
# Concatenated onto kitty-base.conf by gen-theme.sh to build kitty.conf.

foreground              #ffffff
background              #000000
selection_foreground    #000000
selection_background    #ffff00

# Cursor
cursor                  #ffff00
cursor_text_color       #000000

# URL underline color when hovering
url_color               #ffff00

# Kitty window border colors
active_border_color     #ffffff
inactive_border_color   #808080
bell_border_color       #ffff00

# Tab bar
active_tab_foreground   #000000
active_tab_background   #ffffff
inactive_tab_foreground #ffffff
inactive_tab_background #202020
tab_bar_background      #000000

# The 16 terminal colors. Unlike the soft theme, these push toward pure/
# saturated hues rather than pastel — the goal here is maximum legibility
# in direct sunlight, not aesthetic cohesion.
color0  #000000
color8  #555555
color1  #ff3333
color9  #ff5555
color2  #33ff33
color10 #55ff55
color3  #ffff33
color11 #ffff55
color4  #5599ff
color12 #77aaff
color5  #ff55ff
color13 #ff77ff
color6  #33ffff
color14 #55ffff
color7  #ffffff
color15 #ffffff
