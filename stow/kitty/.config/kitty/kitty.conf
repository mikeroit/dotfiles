# stow/kitty/.config/kitty/kitty-base.conf
# Non-theme settings only. Colors live in kitty-theme-{soft,contrast}.conf
# and get concatenated onto this file by scripts/gen-theme.sh to produce
# the real kitty.conf that kitty actually reads.

# --- Remote control (needed for gen-theme.sh's live-reload push) ---
allow_remote_control yes
listen_on unix:/tmp/kitty-socket-{kitty_pid}

# --- Font ---
# JetBrains Mono Nerd is already installed system-wide (ttf-jetbrains-mono-nerd),
# so no new package needed. Nerd Font variant gives you the glyph coverage
# waybar/wofi will also want later, so this stays consistent app-to-app.
font_family      JetBrainsMono Nerd Font
font_size        11.0
disable_ligatures never

# --- Window/layout ---
window_padding_width 6
# Closing the last window/tab shouldn't prompt — tmux is the
# session-persistence layer, not kitty.
confirm_os_window_close 0

# --- Shell integration ---
# The bash package already ships a working prompt; this just lets kitty draw
# its own cursor/marks based on bash's exit-status reporting via shell hooks.
shell_integration enabled

# --- Scrollback ---
scrollback_lines 10000

# --- Cursor ---
#cursor_shape beam
# Steady cursor — a blinking cursor next to a blinking terminal cursor
# in nvim gets busy.
#cursor_blink_interval 0

# --- Keybinds ---
# Kept deliberately sparse. Anything that would collide with tmux's prefix
# or nvim's leader is avoided on purpose — see note below.
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+f5 load_config_file
# stow/kitty/.config/kitty/kitty-theme-soft.conf
# Catppuccin Mocha — soft/low-contrast palette for normal indoor use.
# Concatenated onto kitty-base.conf by gen-theme.sh to build kitty.conf.

foreground              #cdd6f4
background              #1e1e2e
selection_foreground    #1e1e2e
selection_background    #f5e0dc

# Cursor
cursor                  #f5e0dc
cursor_text_color       #1e1e2e

# URL underline color when hovering
url_color               #f5e0dc

# Kitty window border colors (multiple kitty windows/splits, not Hyprland borders)
active_border_color     #b4befe
inactive_border_color   #6c7086
bell_border_color       #f9e2af

# Tab bar
active_tab_foreground   #11111b
active_tab_background   #cba6f7
inactive_tab_foreground #cdd6f4
inactive_tab_background #181825
tab_bar_background      #11111b

# The 16 terminal colors (black/red/green/yellow/blue/magenta/cyan/white,
# each in normal and bright variants) — this is what programs like nvim,
# htop, lazygit, and ls color output map onto.
color0  #45475a
color8  #585b70
color1  #f38ba8
color9  #f38ba8
color2  #a6e3a1
color10 #a6e3a1
color3  #f9e2af
color11 #f9e2af
color4  #89b4fa
color12 #89b4fa
color5  #f5c2e7
color13 #f5c2e7
color6  #94e2d5
color14 #94e2d5
color7  #bac2de
color15 #a6adc8
